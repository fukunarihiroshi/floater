<!DOCTYPE html>
<!-- saved from url=(0042)https://fukunarihiroshi.github.io/floater/ -->
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floater Simulator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sky-top: #5ba3d9;
    --sky-bot: #a8d4f5;
    --grass: #4a8c3f;
    --grass2: #6aad5e;
    --leaf1: #3d7a32;
    --leaf2: #5a9e4e;
    --bark: #6b4423;
    --floater-color: rgba(80,60,20,0.18);
    --divider: #fff;
  }

  body {
    background: #0a0e14;
    min-height: 100vh;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif JP', serif;
    color: #e8e0d0;
    gap: 0;
    padding: 20px 16px;
  }

  /* ── 左サイドパネル ── */
  .controls {
    flex-shrink: 0;
    width: 148px;
    align-self: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-right: 16px;
  }
  .controls-label {
    font-size: 0.64rem;
    color: #5a6a7a;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    line-height: 1.4;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    margin-bottom: 2px;
  }

  /* ── メインコンテンツ列 ── */
  .main-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    min-width: 0;
  }

  header {
    text-align: center;
    padding: 0 20px 14px;
    letter-spacing: 0.04em;
  }
  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.3rem, 4vw, 2rem);
    color: #f0e8d8;
    font-weight: 400;
    letter-spacing: 0.08em;
  }
  header p {
    font-size: 0.78rem;
    color: #8a9aaa;
    margin-top: 6px;
    font-weight: 300;
  }

  .app-wrap {
    position: relative;
    width: min(700px, calc(96vw - 180px));
    aspect-ratio: 4/3;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 60px rgba(0,0,0,0.7);
    cursor: ew-resize;
    user-select: none;
    touch-action: none;
  }

  /* ── 背景シーン（SVG） ── */
  .scene {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── 飛蚊症オーバーレイ（左側クリップ） ── */
  .floater-layer {
    position: absolute; inset: 0;
    pointer-events: none;
    clip-path: inset(0 50% 0 0);
    transition: none;
  }

  .floater-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
  }

  /* ── 左右ラベル ── */
  .label {
    position: absolute;
    top: 14px;
    font-size: 0.68rem;
    letter-spacing: 0.12em;
    font-weight: 600;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    backdrop-filter: blur(6px);
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .label-left {
    left: 14px;
    background: rgba(180,80,40,0.55);
    color: #ffeedd;
  }
  .label-right {
    right: 14px;
    background: rgba(30,100,60,0.55);
    color: #ddffd0;
  }

  /* ── 分割バー ── */
  .divider {
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 3px;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.85);
    box-shadow: 0 0 12px rgba(255,255,255,0.6), 0 0 3px #fff;
    pointer-events: none;
    z-index: 10;
    border-radius: 2px;
  }
  .divider-handle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 38px; height: 38px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 2px 12px rgba(0,0,0,0.35);
    display: flex; align-items: center; justify-content: center;
    z-index: 11;
    pointer-events: none;
  }
  .divider-handle svg { width: 20px; height: 20px; }

  .cb-item {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    padding: 6px 8px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.03);
    transition: background 0.2s, border-color 0.2s;
    width: 100%;
  }
  .cb-item:hover {
    background: rgba(255,255,255,0.07);
    border-color: rgba(255,255,255,0.15);
  }
  .cb-item input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border: 1.5px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    background: transparent;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background 0.18s, border-color 0.18s;
  }
  .cb-item input[type="checkbox"]:checked {
    background: #c87840;
    border-color: #c87840;
  }
  .cb-item input[type="checkbox"]:checked::after {
    content: '';
    position: absolute;
    left: 3px; top: 0px;
    width: 5px; height: 9px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(42deg);
  }
  .cb-item .cb-icon {
    font-size: 1rem;
    line-height: 1;
  }
  .cb-item .cb-text {
    font-size: 0.72rem;
    color: #c8c0b0;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.3;
  }
  .cb-item .cb-text small {
    display: block;
    font-size: 0.62rem;
    color: #5a6a7a;
    margin-top: 1px;
  }

  /* ── 下部説明 ── */
  footer {
    padding: 14px 20px 20px;
    text-align: center;
    font-size: 0.72rem;
    color: #5a6a7a;
    max-width: 600px;
    line-height: 1.8;
  }
  footer strong { color: #8a9aaa; }

  .lang-switch {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 1000;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.16);
    background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.28);
    color: #f6efe4;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 0.86rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }
  .lang-switch button {
    appearance: none;
    border: none;
    border-radius: 999px;
    padding: 8px 14px;
    background: #f6efe4;
    color: #2b3440;
    font: inherit;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,0.18);
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.2s ease;
  }
  .lang-switch button:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 14px rgba(0,0,0,0.22);
  }
  .lang-switch button.secondary {
    background: rgba(255,255,255,0.14);
    color: #f6efe4;
  }

  @media (max-width: 860px) {
    body {
      flex-direction: column;
      padding-top: 76px;
    }
    .controls {
      width: min(700px, 96vw);
      margin-right: 0;
      margin-bottom: 14px;
    }
    .app-wrap {
      width: min(700px, 96vw);
    }
  }

</style>
</head>

<script>
// ── 有効な症状タイプ管理 ──
const activeTypes = { worm: true, dot: true, ring: true, cluster: true, goma: true };

document.getElementById('cb-worm').addEventListener('change', e => { activeTypes.worm = e.target.checked; });
document.getElementById('cb-dot').addEventListener('change', e => { activeTypes.dot = e.target.checked; });
document.getElementById('cb-ring').addEventListener('change', e => { activeTypes.ring = e.target.checked; });
document.getElementById('cb-cluster').addEventListener('change', e => { activeTypes.cluster = e.target.checked; });
document.getElementById('cb-goma').addEventListener('change', e => { activeTypes.goma = e.target.checked; });

// チェックボックスのクリックがドラッグに干渉しないよう阻止
document.getElementById('controls').addEventListener('mousedown', e => e.stopPropagation());
document.getElementById('controls').addEventListener('touchstart', e => e.stopPropagation(), {passive: true});

// ── 飛蚊症パーティクル定義 ──
const FLOATERS = [
  // 糸くず状（ワーム型）
  { type: 'worm', x: 0.22, y: 0.35, segs: 14, segLen: 10, radius: 3.5, wobble: 0.9, opacity: 0.28, drift: {x:0.00012, y:0.00005} },
  { type: 'worm', x: 0.55, y: 0.25, segs: 10, segLen: 8,  radius: 2.5, wobble: 1.2, opacity: 0.22, drift: {x:-0.00008, y:0.00009} },
  { type: 'worm', x: 0.38, y: 0.58, segs: 18, segLen: 9,  radius: 2.8, wobble: 0.7, opacity: 0.20, drift: {x:0.00015, y:-0.00006} },
  { type: 'worm', x: 0.12, y: 0.62, segs: 8,  segLen: 7,  radius: 2.0, wobble: 1.5, opacity: 0.18, drift: {x:0.00010, y:0.00012} },
  { type: 'worm', x: 0.72, y: 0.45, segs: 22, segLen: 8,  radius: 3.0, wobble: 0.6, opacity: 0.25, drift: {x:-0.00012, y:0.00008} },
  { type: 'worm', x: 0.30, y: 0.15, segs: 6,  segLen: 6,  radius: 1.8, wobble: 2.0, opacity: 0.15, drift: {x:0.00006, y:0.00014} },

  // ドット状（細胞のかたまり）
  { type: 'dot',  x: 0.45, y: 0.40, r: 6,  opacity: 0.18, drift: {x:0.00007, y:0.00006} },
  { type: 'dot',  x: 0.18, y: 0.50, r: 4,  opacity: 0.14, drift: {x:0.00011, y:-0.00007} },
  { type: 'dot',  x: 0.68, y: 0.30, r: 5,  opacity: 0.16, drift: {x:-0.00009, y:0.00010} },
  { type: 'dot',  x: 0.82, y: 0.65, r: 8,  opacity: 0.20, drift: {x:0.00005, y:0.00008} },
  { type: 'dot',  x: 0.25, y: 0.75, r: 3,  opacity: 0.12, drift: {x:0.00013, y:0.00004} },
  { type: 'dot',  x: 0.60, y: 0.68, r: 7,  opacity: 0.17, drift: {x:-0.00006, y:0.00011} },

  // リング状（輪っか）
  { type: 'ring', x: 0.35, y: 0.30, r: 12, thickness: 2.5, opacity: 0.16, drift: {x:0.00009, y:0.00007} },
  { type: 'ring', x: 0.62, y: 0.55, r: 16, thickness: 3.0, opacity: 0.13, drift: {x:-0.00008, y:0.00006} },
  { type: 'ring', x: 0.50, y: 0.18, r: 9,  thickness: 2.0, opacity: 0.14, drift: {x:0.00011, y:0.00009} },

  // 蜘蛛の巣状（クラスター）
  { type: 'cluster', x: 0.48, y: 0.48, arms: 6, armLen: 18, r: 2, opacity: 0.20, drift: {x:0.00008, y:0.00006} },
  { type: 'cluster', x: 0.20, y: 0.28, arms: 4, armLen: 12, r: 1.5, opacity: 0.16, drift: {x:0.00012, y:0.00010} },
];

// ── ゴマ型パーティクル生成（1200個）──
const GOMA_COUNT = 1200;
const gomaParticles = [];
for (let i = 0; i < GOMA_COUNT; i++) {
  gomaParticles.push({
    type: 'goma',
    // 視野全体にランダム配置（端まで）
    x: Math.random(),
    y: Math.random(),
    // ベース半径：0.5〜1.4px（超微細）
    r: 0.5 + Math.random() * 0.9,
    // 不透明度：薄め
    opacity: 0.06 + Math.random() * 0.13,
    // 上下揺らぎの位相（各々バラバラ）
    phase: Math.random() * Math.PI * 2,
    // 揺らぎ速度（ゆっくり）
    speed: 0.04 + Math.random() * 0.08,
    // 上下振幅（正規化座標で）
    ampY: 0.004 + Math.random() * 0.008,
    // 微細な横移動
    ampX: 0.001 + Math.random() * 0.002,
    // ゴマの色相（グレー〜淡茶）
    gray: 90 + Math.floor(Math.random() * 50),
  });
}

// ── アニメーション状態 ──
const state = FLOATERS.map(f => ({
  ...f,
  px: f.x, py: f.y,
  phase: Math.random() * Math.PI * 2,
  speed: 0.3 + Math.random() * 0.4,
}));

const canvas = document.getElementById('floaterCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('appWrap');
const floaterLayer = document.getElementById('floaterLayer');
const dividerEl = document.getElementById('divider');

let dividerX = 0.5;
let dragging = false;
let t = 0;

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ── 描画：通常パーティクル ──
function drawFloater(f, W, H) {
  if (!activeTypes[f.type]) return;
  const x = f.px * W, y = f.py * H;
  ctx.save();
  ctx.globalAlpha = f.opacity;

  if (f.type === 'worm') {
    const pts = [];
    let cx = x, cy = y;
    for (let i = 0; i < f.segs; i++) {
      const ang = (i / f.segs) * Math.PI * 2 + f.phase + t * f.speed * 0.5;
      const wob = Math.sin(ang * 3 + t * f.speed) * f.wobble;
      cx += Math.cos(ang + wob) * f.segLen;
      cy += Math.sin(ang + wob) * f.segLen * 0.5;
      pts.push([cx, cy]);
    }
    if (pts.length < 2) { ctx.restore(); return; }
    ctx.beginPath();
    ctx.moveTo(pts[0][0], pts[0][1]);
    for (let i = 1; i < pts.length - 1; i++) {
      const mx = (pts[i][0] + pts[i+1][0]) / 2;
      const my = (pts[i][1] + pts[i+1][1]) / 2;
      ctx.quadraticCurveTo(pts[i][0], pts[i][1], mx, my);
    }
    ctx.strokeStyle = `rgba(40,25,5,1)`;
    ctx.lineWidth = f.radius * 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    ctx.strokeStyle = `rgba(255,255,200,0.18)`;
    ctx.lineWidth = f.radius * 0.8;
    ctx.stroke();

  } else if (f.type === 'dot') {
    const pulse = 1 + Math.sin(t * f.speed + f.phase) * 0.08;
    const rr = f.r * pulse;
    const grd = ctx.createRadialGradient(x, y, 0, x, y, rr);
    grd.addColorStop(0, 'rgba(20,12,0,0.85)');
    grd.addColorStop(0.6, 'rgba(40,25,5,0.5)');
    grd.addColorStop(1, 'rgba(40,25,5,0)');
    ctx.beginPath();
    ctx.arc(x, y, rr, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

  } else if (f.type === 'ring') {
    const pulse = 1 + Math.sin(t * f.speed * 0.7 + f.phase) * 0.05;
    ctx.beginPath();
    ctx.arc(x, y, f.r * pulse, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(30,18,2,0.7)';
    ctx.lineWidth = f.thickness;
    ctx.stroke();

  } else if (f.type === 'cluster') {
    for (let a = 0; a < f.arms; a++) {
      const ang = (a / f.arms) * Math.PI * 2 + f.phase + Math.sin(t * f.speed * 0.3) * 0.15;
      const ex = x + Math.cos(ang) * f.armLen;
      const ey = y + Math.sin(ang) * f.armLen * 0.6;
      ctx.beginPath();
      ctx.moveTo(x, y);
      ctx.quadraticCurveTo(
        x + Math.cos(ang + 0.5) * f.armLen * 0.5,
        y + Math.sin(ang + 0.5) * f.armLen * 0.3,
        ex, ey
      );
      ctx.strokeStyle = 'rgba(30,18,2,0.65)';
      ctx.lineWidth = f.r * 2;
      ctx.lineCap = 'round';
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(ex, ey, f.r * 1.2, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(25,14,2,0.7)';
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(x, y, f.r * 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(20,10,0,0.75)';
    ctx.fill();
  }
  ctx.restore();
}

// ── 描画：ゴマ型（バッチ処理で高速化）──
function drawGoma(W, H) {
  if (!activeTypes.goma) return;
  for (const g of gomaParticles) {
    // 上下揺らぎ（ゆっくり）
    const offsetY = Math.sin(t * g.speed + g.phase) * g.ampY;
    const offsetX = Math.cos(t * g.speed * 0.7 + g.phase) * g.ampX;
    const px = (g.x + offsetX) * W;
    const py = (g.y + offsetY) * H;

    ctx.beginPath();
    ctx.arc(px, py, g.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${g.gray},${g.gray},${g.gray},${g.opacity})`;
    ctx.fill();
  }
}

// ── アニメーションループ ──
function animate(ts) {
  t = ts * 0.001;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // 薄い散乱光ベール
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = 'rgba(200,220,255,1)';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // ゴマ型（背景レイヤー的に最初に描画）
  drawGoma(W, H);

  // 通常パーティクル
  for (const f of state) {
    const wobX = Math.sin(t * f.speed * 0.8 + f.phase) * 0.002;
    const wobY = Math.cos(t * f.speed * 0.6 + f.phase + 1) * 0.0015;
    f.px += f.drift.x + wobX * 0.02;
    f.py += f.drift.y + wobY * 0.02;
    if (f.px < 0.02) { f.px = 0.02; f.drift.x *= -1; }
    if (f.px > 0.98) { f.px = 0.98; f.drift.x *= -1; }
    if (f.py < 0.02) { f.py = 0.02; f.drift.y *= -1; }
    if (f.py > 0.98) { f.py = 0.98; f.drift.y *= -1; }

    drawFloater(f, W, H);
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);

// ── バー操作 ──
function setDivider(ratio) {
  dividerX = Math.max(0.05, Math.min(0.95, ratio));
  const pct = (dividerX * 100).toFixed(2) + '%';
  dividerEl.style.left = pct;
  floaterLayer.style.clipPath = `inset(0 ${(100 - dividerX * 100).toFixed(2)}% 0 0)`;
}
setDivider(0.5);

function getClientX(e) {
  return e.touches ? e.touches[0].clientX : e.clientX;
}
function onMove(e) {
  if (!dragging) return;
  e.preventDefault();
  const rect = wrap.getBoundingClientRect();
  setDivider((getClientX(e) - rect.left) / rect.width);
}

wrap.addEventListener('mousedown', e => { dragging = true; onMove(e); });
wrap.addEventListener('touchstart', e => { dragging = true; onMove(e); }, {passive:false});
window.addEventListener('mousemove', onMove);
window.addEventListener('touchmove', onMove, {passive:false});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('touchend', () => dragging = false);


// ── Bilingual UI ──
const I18N = {
  en: {
    pageTitle: 'Floater Simulator',
    langLabel: 'Language',
    controlsLabel: 'Select<br>symptoms',
    title: 'Floater Simulator',
    subtitle: 'Experience how eye floaters can appear',
    wormLabel: 'Worm type<small>String-like</small>',
    dotLabel: 'Dot type<small>Speck-like</small>',
    ringLabel: 'Ring type<small>Circle-like</small>',
    clusterLabel: 'Cluster type<small>Cobweb-like</small>',
    gomaLabel: 'Sesame type<small>Tiny specks across view</small>',
    leftLabel: 'With floaters',
    rightLabel: 'Normal vision',
    footerStrong: 'Drag the bar',
    footerText: ' left and right to compare floater vision with normal vision.<br>Floaters are caused by fibers or clumps of cells drifting in the vitreous, casting shadows on the retina.'
  },
  ja: {
    pageTitle: '飛蚊症シミュレーター',
    langLabel: '言語',
    controlsLabel: '表示する<br>症状を選択',
    title: '飛蚊症シミュレーター',
    subtitle: 'Floater（飛蚊症）の見え方を体験できます',
    wormLabel: 'ワーム型<small>糸くず状</small>',
    dotLabel: 'ドット型<small>点状</small>',
    ringLabel: 'リング型<small>輪っか状</small>',
    clusterLabel: 'クラスター型<small>蜘蛛の巣状</small>',
    gomaLabel: 'ゴマ型<small>小点群・視野全体</small>',
    leftLabel: '飛蚊症あり',
    rightLabel: '通常の見え方',
    footerStrong: 'バーをドラッグ',
    footerText: 'して左右に動かすと、飛蚊症の見え方と通常の視界を比較できます。<br>飛蚊症は眼球の硝子体内に漂う繊維・細胞の塊が光を遮り、影として見える現象です。'
  }
};

function applyLanguage(lang) {
  const t = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.title = t.pageTitle;
  const langLabel = document.getElementById('lang-label');
  if (langLabel) langLabel.textContent = t.langLabel;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] != null) el.textContent = t[key];
  });

  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    const key = el.getAttribute('data-i18n-html');
    if (t[key] != null) el.innerHTML = t[key];
  });

  const enBtn = document.getElementById('lang-en');
  const jaBtn = document.getElementById('lang-ja');
  enBtn.classList.toggle('secondary', lang !== 'en');
  jaBtn.classList.toggle('secondary', lang === 'en');
}

document.getElementById('lang-en').addEventListener('click', () => applyLanguage('en'));
document.getElementById('lang-ja').addEventListener('click', () => applyLanguage('ja'));
applyLanguage('en');

</script>
